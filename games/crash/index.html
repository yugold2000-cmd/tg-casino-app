<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Шапка -->
    <header class="game-header">
        <button class="back-btn" onclick="window.location.href='../../index.html'">
            <i class="fa-solid fa-chevron-left"></i> Назад
        </button>
        <div class="balance-display">
            <span id="user-balance">10000.00</span> ₽
        </div>
    </header>

    <!-- История (пустая для старта) -->
    <div class="history-bar" id="history-bar">
        <div class="history-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
    </div>

    <!-- График -->
    <div id="game-canvas-container"></div>

    <!-- Компактная панель управления (по центру) -->
    <div class="controls-wrapper">
        <div class="bet-panel">
            <div class="panel-header">
                <label class="checkbox-label">
                    <input type="checkbox" id="auto-bet-check"> <span class="checkmark"></span> Автоставка
                </label>
                <div class="auto-cashout">
                    <label class="checkbox-label">
                        <input type="checkbox" id="auto-cashout-check"> <span class="checkmark"></span> Автовывод
                    </label>
                    <div class="cashout-input-wrapper">
                        <span>x</span>
                        <input type="number" step="0.1" class="cashout-input" id="cashout-target" value="2.00">
                    </div>
                </div>
            </div>
            
            <div class="panel-body">
                <div class="bet-input-section">
                    <div class="bet-input-top">
                        <button class="adjust-btn" onclick="adjustBet(-100)"><i class="fa-solid fa-minus"></i></button>
                        <input type="number" id="bet-amount" value="100">
                        <button class="adjust-btn" onclick="adjustBet(100)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="bet-input-bottom">
                        <button onclick="addBet(50)">+50</button>
                        <button onclick="addBet(100)">+100</button>
                        <button onclick="addBet(500)">+500</button>
                        <button onclick="addBet(1000)">+1K</button>
                    </div>
                </div>
                <!-- Главная кнопка -->
                <button class="action-btn place-bet" id="main-action-btn" onclick="handleMainAction()">
                    <span class="btn-text" id="action-btn-text">СТАВКА</span>
                    <span class="btn-subtext" id="action-btn-subtext"></span>
                </button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
