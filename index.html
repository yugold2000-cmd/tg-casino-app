<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Casino</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключение иконок FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">

    <!-- === ШАПКА (HEADER) === -->
    <header class="app-header">
        <div class="header-left">
            <!-- Можно поставить логотип или иконку меню -->
            <i class="fa-solid fa-bars menu-toggle"></i>
        </div>
        
        <!-- Плашка баланса и кнопка пополнения -->
        <div class="header-center">
            <div class="balance-pill">
                <span class="currency-badge">₽</span>
                <span class="balance-amount">1 250.00</span>
                <i class="fa-solid fa-chevron-down arrow-icon"></i>
            </div>
            <button class="deposit-btn">+</button>
        </div>

        <!-- Аватарка профиля справа -->
        <div class="header-right">
            <div class="profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <!-- === ОСНОВНОЙ КОНТЕНТ === -->
    <main class="main-content">
        
        <!-- Заголовок секции игр -->
        <div class="section-header">
            <h2 class="section-title">Popular</h2>
            <button class="see-all-btn">All</button>
        </div>

        <!-- Сетка игр (Вертикальные карточки как на фото) -->
        <div class="games-grid-modern">
            
            <!-- 1. Crush Game -->
            <div class="game-card-mini" onclick="openGameModal('Crush Game', 'images/crash-bg.png')">
                <img src="images/crash-bg.png" class="game-bg-img" alt="Crush Game">
                <div class="game-shadow-overlay"></div>
                <span class="game-title">CRUSH GAME</span>
            </div>

            <!-- 2. Plinko -->
            <div class="game-card-mini" onclick="openGameModal('Plinko', 'images/plinko-bg.png')">
                <img src="images/plinko-bg.png" class="game-bg-img" alt="Plinko">
                <div class="game-shadow-overlay"></div>
                <span class="game-title">PLINKO</span>
            </div>

            <!-- 3. Roulette -->
            <div class="game-card-mini" onclick="openGameModal('Roulette', 'images/roulette-bg.png')">
                <img src="images/roulette-bg.png" class="game-bg-img" alt="Roulette">
                <div class="game-shadow-overlay"></div>
                <span class="game-title">ROULETTE</span>
            </div>

            <!-- 4. Blackjack -->
            <div class="game-card-mini" onclick="openGameModal('Blackjack', 'images/blackjack-bg.png')">
                <img src="images/blackjack-bg.png" class="game-bg-img" alt="Blackjack">
                <div class="game-shadow-overlay"></div>
                <span class="game-title">BLACKJACK</span>
            </div>

            <!-- 5. Dice -->
            <div class="game-card-mini" onclick="openGameModal('Dice', 'images/dice-bg.png')">
                <img src="images/dice-bg.png" class="game-bg-img" alt="Dice">
                <div class="game-shadow-overlay"></div>
                <span class="game-title">DICE</span>
            </div>

            <!-- 6. Tickets -->
            <div class="game-card-mini" onclick="openGameModal('Tickets', 'images/tickets-bg.png')">
                <img src="images/tickets-bg.png" class="game-bg-img" alt="Tickets">
                <div class="game-shadow-overlay"></div>
                <span class="game-title">TICKETS</span>
            </div>

        </div>
    </main>

    <!-- === НИЖНЕЕ НАВИГАЦИОННОЕ МЕНЮ (BOTTOM NAV) === -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-wallet"></i>
            <span>Cashier</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-futbol"></i>
            <span>Sports</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-gift"></i>
            <span>Bonuses</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-layer-group"></i>
            <span>Casino</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-bars"></i>
            <span>Menu</span>
        </a>
    </nav>

    <!-- Модальное окно игры (оставь своё или используй это) -->
    <div id="game-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('game-modal').classList.add('hidden')">&times;</span>
            <div id="modal-game-icon"></div>
            <h3 id="modal-game-title">Game Title</h3>
            <button class="play-btn-modal">Начать игру</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
