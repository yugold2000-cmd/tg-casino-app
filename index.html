<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <script src="https://telegram.org/js/telegram-web-app.js">
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // Разворачиваем
        </script>
    </head>
    <body>
        <header class="header-main" style="color: white;">
                шапка    
        </header >
                
        <section class="header-main" style="color: white;">
            иксы
            <!-- <div class="btn-bet-history"><button></button></div> -->
        </section>

        <main>
            <div class="game-window" style="color: white;">
                <div id="pixi-canvas"></div>
                Игра
            </div>

            <hr class="line-menu ">
            
            <div class="bet-menu">
                <div class="btn-makebet-block">
                    <button class="btn-makebet">Сделать ставку</button>
                </div>

                <!-- Bet -->
                <div class="field-group">
                    <div class="sum-bet-text">
                        <span>Сумма ставки</span>
                    </div>
                    <div class="bet-input-menu">            
                        <input type="number" placeholder="0.00" class="allinput bet-input-num"  required>
                        <div class="bet-multipliers">
                            <button class="allbtn btn-bet">1/2</button>
                            <button class="allbtn btn-bet">2x</button>
                        </div>
                    </div>
                </div>

                <!-- auto cashout (checkbox and buttons) -->
                <div class="field-group">
                    <div class="autocashout-text">
                        <label class="auto-text-checkbox">
                            <input type="checkbox" class="btn-checkbox">
                            <span >Автовывод</span>
                        </label>
                    </div>
                    <div class="autocashout-menu">      
                        <input type="number" placeholder="2.0x" class="allinput autocashout-input-num" disabled>
                        <div class="autocashout-plus-minus">
                            <button class="allbtn btn-autocashout" disabled>-</button>
                            <button class="allbtn btn-autocashout" disabled>+</button>
                        </div>
                    </div>
                </div>
 
                <!-- mode (manual or auto mode) -->
                <div class="game-mode-menu">
                    <button class="mode-btn">Ручной режим</button>
                    <button class="mode-btn">Автоматический</button>
                </div>      
            </div>


        </main>    
    </body>
</html>
