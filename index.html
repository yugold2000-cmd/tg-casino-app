<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    
    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <header class="top-header">
        <!-- Слева: Баланс и Плюс -->
        <div class="header-left">
            <div class="balance-pill" id="balance-btn" onclick="toggleBalanceDropdown(event)">
                <div class="currency-icon" id="active-currency-icon">
                    <i class="fa-solid fa-ruble-sign" style="color: #ffffff;"></i>
                </div>
                <span class="balance-amount" id="active-balance-amount">1.25</span>
                <i class="fa-solid fa-chevron-down down-arrow"></i>
            </div>
            
            <button class="deposit-btn" onclick="switchTab('wallet')"><i class="fa-solid fa-plus"></i></button>

            <!-- Выпадающий список валют (теперь привязан к левому краю) -->
            <div class="balance-dropdown hidden" id="balance-dropdown">
                <div class="crypto-item" onclick="selectCurrency('RUB', '1.25', 'fa-solid fa-ruble-sign', '#a855f7')">
                    <div class="dropdown-icon" style="background: #a855f7;"><i class="fa-solid fa-ruble-sign"></i></div> 
                    <span>RUB</span>
                </div>
                <div class="crypto-item" onclick="selectCurrency('TON', '14.50', 'fa-regular fa-gem', '#0088cc')">
                    <div class="dropdown-icon" style="background: #0088cc;"><i class="fa-regular fa-gem"></i></div> 
                    <span>Toncoin</span>
                </div>
                <div class="crypto-item" onclick="selectCurrency('USDT', '150.00', 'fa-solid fa-dollar-sign', '#26a69a')">
                    <div class="dropdown-icon" style="background: #26a69a;"><i class="fa-solid fa-dollar-sign"></i></div> 
                    <span>USDT</span>
                </div>
                <div class="crypto-item" onclick="selectCurrency('STARS', '500', 'fa-solid fa-star', '#ffb800')">
                    <div class="dropdown-icon" style="background: #ffb800;"><i class="fa-solid fa-star"></i></div> 
                    <span>Telegram Stars</span>
                </div>
            </div>
        </div>
        
        <!-- Справа: Аватарка профиля -->
        <div class="header-right">
            <div class="profile-icon">
                <div class="avatar-placeholder" id="user-avatar">?</div>
            </div>
        </div>
    </header>

    <!-- Вкладка 1: КАЗИНО (ИГРЫ) -->
    <main id="view-casino" class="view-section active">
        <h2 class="section-title">Игры</h2>
        <div class="games-layout">
            
            <!-- Crush Game -->
            <div class="game-banner-card" onclick="openGame('Crush Game')">
                <img src="images/crash-bg.png" class="banner-bg" alt="Crush">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <h3 class="banner-title">Crush game</h3>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Plinko -->
            <div class="game-banner-card" onclick="openGame('Plinko')">
                <img src="images/plinko-bg.png" class="banner-bg" alt="Plinko">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <h3 class="banner-title">Plinko</h3>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Roulette -->
            <div class="game-banner-card" onclick="openGame('Roulette')">
                <img src="images/roulette-bg.png" class="banner-bg" alt="Roulette">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <h3 class="banner-title">Roulette</h3>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Blackjack -->
            <div class="game-banner-card" onclick="openGame('Blackjack')">
                <img src="images/blackjack-bg.png" class="banner-bg" alt="Blackjack">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <h3 class="banner-title">Blackjack</h3>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Dice -->
            <div class="game-banner-card" onclick="openGame('Dice')">
                <img src="images/dice-bg.png" class="banner-bg" alt="Dice">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <h3 class="banner-title">Dice</h3>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Tickets -->
            <div class="game-banner-card" onclick="openGame('Tickets')">
                <img src="images/tickets-bg.png" class="banner-bg" alt="Tickets">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <h3 class="banner-title">Tickets</h3>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

        </div>
    </main>

    <!-- Вкладка 2: КОШЕЛЕК -->
    <main id="view-wallet" class="view-section">
        <h2 class="section-title">Кошелек</h2>
        <div class="wallet-card">
            <p>Текущий баланс</p>
            <h1 class="wallet-balance-big" id="wallet-balance-big">1.25 RUB</h1>
            <div class="wallet-actions">
                <button class="wallet-btn deposit"><i class="fa-solid fa-arrow-down"></i> Пополнить</button>
                <button class="wallet-btn withdraw"><i class="fa-solid fa-arrow-up"></i> Вывести</button>
            </div>
        </div>
    </main>

    <!-- Вкладка 3: МЕНЮ -->
    <main id="view-menu" class="view-section">
        <h2 class="section-title">Меню</h2>
        <div class="menu-list">
            <div class="menu-item" onclick="tg.showAlert('Бонусы в разработке')">
                <i class="fa-solid fa-gift"></i>
                <span>Бонусы и промокоды</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </div>
            <div class="menu-item" onclick="tg.showAlert('История в разработке')">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>История ставок</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </div>
            <div class="menu-item" onclick="tg.showAlert('Настройки в разработке')">
                <i class="fa-solid fa-gear"></i>
                <span>Настройки аккаунта</span>
                <i class="fa-solid fa-chevron-right arrow"></i>
            </div>
        </div>
    </main>

    <!-- ПЛАВАЮЩАЯ КНОПКА ПОДДЕРЖКИ -->
    <button class="support-fab" onclick="tg.showAlert('Служба поддержки откроется здесь')">
        <i class="fa-solid fa-headset"></i>
    </button>

    <!-- НИЖНЕЕ МЕНЮ (Переключает вкладки) -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item" id="nav-wallet" onclick="switchTab('wallet')">
            <i class="fa-solid fa-wallet"></i>
            <span>Кошелек</span>
        </a>
        <a href="#" class="nav-item active" id="nav-casino" onclick="switchTab('casino')">
            <i class="fa-solid fa-layer-group"></i>
            <span>Казино</span>
        </a>
        <a href="#" class="nav-item" id="nav-menu" onclick="switchTab('menu')">
            <i class="fa-solid fa-bars"></i>
            <span>Меню</span>
        </a>
    </nav>

</div>

<script src="app.js"></script>
</body>
</html>
