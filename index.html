<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Casino</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключение иконок FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">

    <div class="app-container">
    
    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <header class="top-header">
        <div class="header-left">
            <!-- Пусто, убрали лишние кнопки и полоски -->
        </div>
        
        <div class="header-center">
            <!-- Увеличенная кнопка баланса -->
            <div class="balance-pill" onclick="toggleBalanceDropdown()">
                <div class="currency-icon"><i class="fa-brands fa-bitcoin"></i></div>
                <span class="balance-amount">0.045 BTC</span>
                <i class="fa-solid fa-chevron-down down-arrow"></i>
            </div>
            
            <!-- Выпадающий список криптовалют (скрыт по умолчанию) -->
            <div class="balance-dropdown hidden" id="balance-dropdown">
                <div class="crypto-item">
                    <i class="fa-brands fa-ethereum" style="color: #627eea;"></i> 
                    <span>1.25 ETH</span>
                </div>
                <div class="crypto-item">
                    <i class="fa-solid fa-ruble-sign" style="color: #26a69a;"></i> 
                    <span>15 000 RUB</span>
                </div>
                <div class="crypto-item">
                    <i class="fa-brands fa-usdt" style="color: #26a69a;"></i> 
                    <span>150 USDT</span>
                </div>
            </div>
        </div>
        
        <div class="header-right">
            <!-- Кнопка аккаунта (теперь содержит бонусы) -->
            <div class="profile-icon" onclick="openAccountModal()">
                <img src="images/avatar.jpg" alt="Profile" onerror="this.src='https://via.placeholder.com/40'">
                <span class="notification-dot"></span>
            </div>
        </div>
    </header>

    <!-- ГЛАВНЫЙ ЭКРАН (Блоки игр) -->
    <main class="main-content">
        <h2 class="section-title">Популярное</h2>
        
        <div class="games-layout">
            <!-- Блок игры 1 -->
            <div class="game-banner-card" onclick="openGameModal('Crush Game', 'images/crash-bg.png')">
                <img src="images/crash-bg.png" class="banner-bg" alt="Crush">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <span class="badge-original">Original</span>
                    <div class="banner-info">
                        <h3 class="banner-title">Crush Game</h3>
                        <span class="players-online"><i class="fa-solid fa-user-group"></i> 202 игрока</span>
                    </div>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <!-- Блок игры 2 -->
            <div class="game-banner-card" onclick="openGameModal('Plinko', 'images/plinko-bg.png')">
                <img src="images/plinko-bg.png" class="banner-bg" alt="Plinko">
                <div class="banner-overlay"></div>
                <div class="banner-content">
                    <span class="badge-original">Original</span>
                    <div class="banner-info">
                        <h3 class="banner-title">Plinko</h3>
                        <span class="players-online"><i class="fa-solid fa-user-group"></i> 187 игроков</span>
                    </div>
                    <button class="play-banner-btn">Играть <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
            
            <!-- Остальные игры добавляй по такому же шаблону -->
        </div>
    </main>

    <!-- ПЛАВАЮЩАЯ КНОПКА ПОДДЕРЖКИ -->
    <button class="support-fab">
        <i class="fa-solid fa-headset"></i>
    </button>

    <!-- НИЖНЕЕ МЕНЮ (3 кнопки на русском) -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="fa-solid fa-wallet"></i>
            <span>Баланс</span>
        </a>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-layer-group"></i>
            <span>Казино</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-bars"></i>
            <span>Меню</span>
        </a>
    </nav>

</div>
</body>
</html>
